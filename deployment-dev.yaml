apiVersion: apps/v1
kind: Deployment
metadata:
  name: lab5-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: lab5-app
  template:
    metadata:
      labels:
        app: lab5-app
    spec:
      containers:
      - name: nginx
        image: cithit/subletb-lab5:latest
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: lab5-service
spec:
  selector:
    app: lab5-app
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
  type: NodePort
